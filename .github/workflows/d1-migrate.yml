# Apply D1 migrations to the remote database (see wrangler.toml → habit-db).
# Requires repo secret: CLOUDFLARE_API_TOKEN with at least D1 Edit (+ Account read).
name: D1 migrations (remote)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "migrations/**"
      - "wrangler.toml"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Apply pending migrations
        run: npx wrangler d1 migrations apply habit-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
